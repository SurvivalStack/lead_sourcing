name: Project Updates
on:
  issues:
    types: [labeled]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync_and_notify:
    runs-on: ubuntu-latest
    # Force Node 24 to clear the deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Sync and Alert
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOMATION_TOKEN }}
          script: |
            const query = `query($owner:String!, $repo:String!) {
              repository(owner:$owner, name:$repo) {
                issues(states:OPEN, first:50) {
                  nodes {
                    number
                    title
                    labels(first:10) { nodes { name } }
                    projectItems(first:5) {
                      nodes {
                        fieldValueByName(name: "Status") {
                          ... on ProjectV2ItemFieldSingleSelectValue { name }
                        }
                      }
                    }
                  }
                }
              }
            }`;
            
            const res = await github.graphql(query, { 
              owner: context.repo.owner, 
              repo: context.repo.repo 
            });

            for (const issue of res.repository.issues.nodes) {
              const status = issue.projectItems.nodes?.fieldValueByName?.name;
              console.log(`Checking Issue #${issue.number}: "${issue.title}"`);
              
              if (!status) {
                console.log(`- No "Status" field found for this issue on the board. Skipping.`);
                continue;
              }

              const targetLabel = `status: ${status.toLowerCase()}`;
              const currentLabels = issue.labels.nodes.map(l => l.name);
              console.log(`- Board Status: ${status} | Current Labels: [${currentLabels.join(', ')}]`);

              if (!currentLabels.includes(targetLabel)) {
                console.log(`- Mismatch detected. Updating label to ${targetLabel}...`);
                
                const labelsToRemove = currentLabels.filter(l => l.startsWith('status: '));
                for (const l of labelsToRemove) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: l
                  }).catch(() => {});
                }

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [targetLabel]
                });

                console.log(`- Sending Discord notification...`);
                await fetch("${{ secrets.DISCORD_PROJECT_WEBHOOK }}", {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    content: `Project Update: **${issue.title}** is now **${status}**`
                  })
                });
              } else {
                console.log(`- Issue is already in sync. No action taken.`);
              }
            }
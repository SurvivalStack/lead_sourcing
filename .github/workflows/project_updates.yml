name: Project Updates
on:
  issues:
    types: [labeled]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync_and_notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Sync and Alert
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOMATION_TOKEN }}
          script: |
            const query = `query($owner:String!, $repo:String!) {
              repository(owner:$owner, name:$repo) {
                issues(states:OPEN, first:10, orderBy: {field: CREATED_AT, direction: DESC}) {
                  nodes {
                    number
                    title
                    labels(first:5) { nodes { name } }
                    projectItems(first:3) {
                      nodes {
                        project { title }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              field { ... on ProjectV2FieldCommon { name } }
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }`;
            
            const res = await github.graphql(query, { owner: context.repo.owner, repo: context.repo.repo });

            for (const issue of res.repository.issues.nodes) {
              console.log(`--- Checking Issue #${issue.number}: "${issue.title}" ---`);
              
              for (const item of issue.projectItems.nodes) {
                console.log(`  Board: "${item.project.title}"`);
                
                // Log every field found on the card
                const fields = item.fieldValues.nodes.filter(f => f.field);
                if (fields.length === 0) {
                  console.log(`    [!] No fields (like Status) are set for this card.`);
                  continue;
                }

                fields.forEach(f => console.log(`    Field found: "${f.field.name}" | Value: "${f.name}"`));

                // Attempt to find the one that acts as our Status
                const statusField = fields.find(f => 
                  f.field.name.toLowerCase() === 'status' || 
                  f.field.name.toLowerCase() === 'progress'
                );

                if (statusField) {
                  const status = statusField.name;
                  const targetLabel = `status: ${status.toLowerCase()}`;
                  const currentLabels = issue.labels.nodes.map(l => l.name);

                  if (!currentLabels.includes(targetLabel)) {
                    console.log(`    ACTION: Updating label to ${targetLabel}`);
                    // ... (rest of the labeling and discord logic remains the same)
                    const labelsToRemove = currentLabels.filter(l => l.startsWith('status: '));
                    for (const l of labelsToRemove) {
                      await github.rest.issues.removeLabel({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issue.number,
                        name: l
                      }).catch(() => {});
                    }
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      labels: [targetLabel]
                    });
                    await fetch("${{ secrets.DISCORD_PROJECT_WEBHOOK }}", {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ content: `Project Update: **${issue.title}** is now **${status}**` })
                    });
                  } else {
                    console.log(`    Status is already in sync.`);
                  }
                }
              }
            }